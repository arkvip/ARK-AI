<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Logo-ICON.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/fonts/fonts.css" />
    <title>BitFun - AI Code Assistant</title>
    <script>
      (function () {
        var dark = '#121214';
        /* Keep in sync with presets/light-theme.ts colors.background.primary */
        var light = '#f3f3f5';
        var m = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
        var root = document.documentElement;
        var bg = root.style.backgroundColor || (m && m.matches ? dark : light);
        root.style.setProperty('--bitfun-startup-bg', bg);
        root.style.backgroundColor = bg;
        function paintBody() {
          if (document.body) document.body.style.backgroundColor = bg;
        }
        paintBody();
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', paintBody);
        } else {
          paintBody();
        }
      })();
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      
      /* Fallback before inline script runs; align with dark / light theme primaries */
      html {
        background-color: #121214;
      }
      @media (prefers-color-scheme: light) {
        html {
          background-color: #f3f3f5;
        }
      }
      
      body {
        background-color: inherit;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      .bitfun-preload {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bitfun-startup-bg, inherit);
        color: rgba(143, 143, 153, 0.92);
        font-family: "Noto Sans SC", "Inter", "Segoe UI", system-ui, sans-serif;
        font-size: 13px;
      }

      .bitfun-preload__content {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .bitfun-preload__spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(143, 143, 153, 0.24);
        border-top-color: rgba(143, 143, 153, 0.9);
        border-radius: 50%;
        animation: bitfun-preload-spin 0.8s linear infinite;
      }

      @keyframes bitfun-preload-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="bitfun-preload" aria-live="polite">
        <div class="bitfun-preload__content">
          <span class="bitfun-preload__spinner" aria-hidden="true"></span>
          <span>Loading workspace...</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
